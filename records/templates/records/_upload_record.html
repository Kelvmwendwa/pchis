<div class="card border-0 shadow-sm rounded-4 mb-5">
  <div class="card-body p-4">
    <h4 class="fw-bold mb-3 text-info">
      <i class="bi bi-upload me-2"></i> Upload Medical Record
    </h4>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-bold">Record Category</label>
        {{ form.category }}
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Record Title</label>
        {{ form.title }}
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Medical Notes / Symptoms</label>
        {{ form.description }}
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Upload Supporting Document</label>
        {{ form.document }}
      </div>
      <div class="d-flex justify-content-end mt-4">
        <button type="submit" class="btn btn-info text-white rounded-pill px-5">Upload</button>
      </div>
    </form>
  </div>
</div>
