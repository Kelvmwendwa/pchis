<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCHIS | Reset Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box;
        font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { display:flex; justify-content:center; align-items:center;
           min-height:100vh; background:#f0f0f0; }
    .card {
      background:linear-gradient(135deg,#6a11cb,#2575fc);
      padding:2rem; border-radius:18px; text-align:center;
      color:#fff; width:100%; max-width:380px;
      box-shadow:0 12px 30px rgba(0,0,0,.2);
    }
    .logo i  { font-size:2rem; }
    .logo h2 { font-size:1.5rem; font-weight:700; margin:.3rem 0 .2rem; }
    .logo p  { font-size:.78rem; opacity:.85; margin-bottom:1.4rem; }
    .info {
      background:rgba(255,255,255,.15); border-radius:9px;
      padding:.75rem 1rem; font-size:.82rem; margin-bottom:1.2rem; line-height:1.5;
    }
    input[type="email"] {
      width:100%; padding:.72rem .9rem; border:none;
      border-radius:9px; background:rgba(255,255,255,.92);
      color:#333; font-size:.9rem; margin-bottom:.9rem;
    }
    input:focus { outline:2px solid #9d4edd; background:#fff; }
    button {
      width:100%; padding:.8rem; border:none; border-radius:9px;
      background:#9d4edd; color:#fff; font-weight:700;
      font-size:1rem; cursor:pointer; transition:all .25s;
    }
    button:hover { background:#7b2cbf; transform:translateY(-2px); }
    .back { margin-top:1.2rem; font-size:.82rem; }
    .back a { color:#fff; text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <i class="bi bi-lock-fill"></i>
      <h2>Reset Password</h2>
      <p>PCHIS · Patient-Centered Health Information System</p>
    </div>

    <div class="info">
      <i class="bi bi-envelope me-1"></i>
      Enter your email address and we'll send you a link to reset your password.
    </div>

    <form method="POST">
      {% csrf_token %}
      <input type="email" name="email"
             placeholder="Your email address" required autofocus>
      <button type="submit">
        <i class="bi bi-send me-1"></i> Send Reset Link
      </button>
    </form>

    <div class="back">
      <a href="{% url 'accounts:login' %}">
        <i class="bi bi-arrow-left me-1"></i> Back to login
      </a>
    </div>
  </div>
</body>
</html>
