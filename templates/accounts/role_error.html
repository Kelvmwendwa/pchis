<!DOCTYPE html>
<html lang="en">
<head>
    <title>Access Denied - PCHIS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card shadow-sm border-0 rounded-4" style="max-width: 450px;">
        <div class="card-body p-5 text-center">
            <i class="bi bi-exclamation-octagon-fill text-danger mb-3" style="font-size: 3rem;"></i>
            <h2 class="text-dark fw-bold">Access Denied</h2>
            <p class="text-muted">Your account role (<strong>{{ request.user.role }}</strong>) does not have permission to view this portal.</p>

            <div class="d-grid gap-2 mt-4">
                <a href="{% url 'dashboard:role_redirect' %}" class="btn btn-primary btn-lg rounded-pill">
                    Go to My Dashboard
                </a>

                <form action="{% url 'accounts:logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary w-100 rounded-pill mt-2">
                        Sign Out / Switch User
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
