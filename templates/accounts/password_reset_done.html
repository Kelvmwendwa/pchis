<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCHIS | Email Sent</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box;
        font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { display:flex; justify-content:center; align-items:center;
           min-height:100vh; background:#f0f0f0; }
    .card {
      background:linear-gradient(135deg,#6a11cb,#2575fc);
      padding:2rem; border-radius:18px; text-align:center;
      color:#fff; width:100%; max-width:380px;
      box-shadow:0 12px 30px rgba(0,0,0,.2);
    }
    .icon-wrap {
      width:64px; height:64px; background:rgba(255,255,255,.2);
      border-radius:50%; display:flex; align-items:center;
      justify-content:center; margin:0 auto 1rem; font-size:1.8rem;
    }
    h2 { font-size:1.4rem; font-weight:700; margin-bottom:.5rem; }
    p  { font-size:.85rem; opacity:.9; line-height:1.6; margin-bottom:1.2rem; }
    .steps {
      background:rgba(255,255,255,.12); border-radius:10px;
      padding:1rem; text-align:left; font-size:.8rem;
      line-height:1.8; margin-bottom:1.4rem;
    }
    .steps li { list-style:none; padding-left:.5rem; }
    .steps li::before { content:"→ "; opacity:.7; }
    a.btn {
      display:inline-block; padding:.7rem 2rem;
      background:#9d4edd; color:#fff; border-radius:9px;
      text-decoration:none; font-weight:700; font-size:.9rem;
      transition:background .2s;
    }
    a.btn:hover { background:#7b2cbf; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <i class="bi bi-envelope-check-fill"></i>
    </div>
    <h2>Check Your Email</h2>
    <p>
      If an account exists with that email address,
      we've sent a password reset link.
    </p>
    <ul class="steps">
      <li>Open your email inbox</li>
      <li>Click the reset link in the email</li>
      <li>The link expires in 24 hours</li>
      <li>Check your spam folder if you don't see it</li>
    </ul>
    <a href="{% url 'accounts:login' %}" class="btn">
      <i class="bi bi-arrow-left me-1"></i> Back to Login
    </a>
  </div>
</body>
</html>
