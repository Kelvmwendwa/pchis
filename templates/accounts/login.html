<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCHIS | Secure Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box;
        font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }

    body {
      display:flex; justify-content:center; align-items:center;
      min-height:100vh; background:#f0f0f0;
    }

    .card {
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      padding: 2rem 2rem 1.6rem;
      border-radius: 18px;
      text-align: center;
      color: white;
      width: 100%;
      max-width: 380px;          /* narrower */
      box-shadow: 0 12px 30px rgba(0,0,0,.2);
    }

    /* ── Header ── */
    .logo i  { font-size:2rem; color:#fff; }
    .logo h2 { font-size:1.6rem; font-weight:700; margin:.25rem 0 .15rem; }
    .logo p  { font-size:.78rem; opacity:.85; margin-bottom:1.4rem; }

    /* ── Messages ── */
    .err {
      background:rgba(255,0,0,.2); border:1px solid rgba(255,0,0,.3);
      border-radius:7px; padding:8px 10px;
      font-size:.8rem; margin-bottom:1rem;
    }

    /* ── Inputs ── */
    .field { margin-bottom:.7rem; }
    .input-wrap { position:relative; }

    input[type="text"],
    input[type="password"] {
      width:100%; padding:.72rem .9rem;
      padding-right:2.8rem;
      border:none; border-radius:9px;
      background:rgba(255,255,255,.92);
      color:#333; font-size:.9rem;
      transition:all .2s;
    }
    input:focus {
      outline:2px solid #9d4edd;
      background:#fff;
      box-shadow:0 0 8px rgba(157,78,221,.3);
    }

    .eye {
      position:absolute; top:50%; right:.9rem;
      transform:translateY(-50%);
      color:#6a11cb; cursor:pointer;
      font-size:1.05rem; opacity:.7; transition:.2s;
    }
    .eye:hover { opacity:1; }

    /* ── Remember / Forgot ── */
    .meta {
      display:flex; justify-content:space-between;
      align-items:center; font-size:.78rem; margin:.9rem 0;
    }
    .meta label { display:flex; align-items:center; gap:5px; cursor:pointer; }
    .meta a { color:#fff; text-decoration:none; }
    .meta a:hover { text-decoration:underline; }

    /* ── Submit ── */
    button[type="submit"] {
      width:100%; padding:.8rem; border:none;
      border-radius:9px; background:#9d4edd;
      color:#fff; font-weight:700; font-size:1rem;
      cursor:pointer; transition:all .25s; margin-top:.4rem;
    }
    button[type="submit"]:hover {
      background:#7b2cbf;
      transform:translateY(-2px);
      box-shadow:0 5px 14px rgba(0,0,0,.2);
    }

    /* ── Sign up link ── */
    .signup { margin-top:1.2rem; font-size:.82rem; }
    .signup a { color:#fff; font-weight:700; text-decoration:underline; }

    /* ── Footer ── */
    .foot { margin-top:1.2rem; font-size:.65rem; opacity:.65; }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo">
      <i class="bi bi-person-lock"></i>
      <h2>PCHIS</h2>
      <p>Patient-Centered Health Information System</p>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="err">{{ message }}</div>
    {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'accounts:login' %}">
      {% csrf_token %}

      <div class="field">
        <div class="input-wrap">
          <input type="text" name="username"
                 placeholder="Username" required autocomplete="username">
        </div>
      </div>

      <div class="field">
        <div class="input-wrap">
          <input type="password" id="pwd" name="password"
                 placeholder="Password" required autocomplete="current-password">
          <i class="bi bi-eye eye" id="eyeToggle"></i>
        </div>
      </div>

      <div class="meta">
        <label>
          <input type="checkbox" name="remember"> Remember me
        </label>
        <a href="{% url 'accounts:password_reset' %}">Forgot password?</a>
      </div>

      <button type="submit">Sign In</button>

      <p class="signup">
        No account? <a href="{% url 'patients:register' %}">Sign up as a patient</a>
      </p>
      <div class="foot">&copy; 2026 PCHIS Healthcare Information System</div>
    </form>
  </div>

  <script>
    document.getElementById('eyeToggle').addEventListener('click', function () {
      const pwd = document.getElementById('pwd');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });
  </script>
</body>
</html>
