<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PCHIS | Password Reset Complete</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box;
        font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { display:flex; justify-content:center; align-items:center;
           min-height:100vh; background:#f0f0f0; }
    .card {
      background:linear-gradient(135deg,#6a11cb,#2575fc);
      padding:2rem; border-radius:18px; text-align:center;
      color:#fff; width:100%; max-width:380px;
      box-shadow:0 12px 30px rgba(0,0,0,.2);
    }
    .icon-wrap {
      width:70px; height:70px; background:rgba(255,255,255,.2);
      border-radius:50%; display:flex; align-items:center;
      justify-content:center; margin:0 auto 1.2rem; font-size:2rem;
    }
    h2 { font-size:1.5rem; font-weight:700; margin-bottom:.5rem; }
    p  { font-size:.85rem; opacity:.9; line-height:1.6; margin-bottom:1.6rem; }
    a.btn {
      display:block; padding:.8rem; background:#9d4edd;
      color:#fff; border-radius:9px; text-decoration:none;
      font-weight:700; font-size:1rem; transition:background .2s;
    }
    a.btn:hover { background:#7b2cbf; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <i class="bi bi-shield-check-fill"></i>
    </div>
    <h2>Password Updated!</h2>
    <p>
      Your password has been successfully reset.
      You can now sign in with your new password.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn">
      <i class="bi bi-box-arrow-in-right me-1"></i> Sign In Now
    </a>
  </div>
</body>
</html>
